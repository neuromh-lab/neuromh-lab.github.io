  <line x1="55" y1="22" x2="40" y2="18" stroke="#4A9EBF" stroke-width="1.5" opacity="0.5"/>
  <line x1="55" y1="22" x2="60" y2="40" stroke="#4A9EBF" stroke-width="1.5" opacity="0.5"/>
  <line x1="55" y1="22" x2="40" y2="38" stroke="#4A9EBF" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="40" x2="40" y2="38" stroke="#4A9EBF" stroke-width="1.5" opacity="0.5"/>
