  <line x1="40" y1="38" x2="50" y2="58" stroke="#4A9EBF" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="58" x2="50" y2="58" stroke="#4A9EBF" stroke-width="1.5" opacity="0.5"/>
  <!-- Nodes -->
  <circle cx="40" cy="18" r="4.5" fill="#2C5F8A"/>
  <circle cx="25" cy="22" r="4" fill="#2C5F8A"/>
  <circle cx="55" cy="22" r="4" fill="#2C5F8A"/>
