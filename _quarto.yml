project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "NeuroMH Lab"
  description: "Neurocognitive Development & Mental Health Research Lab at Maastricht University, led by Franc Donkers — EEG/ERP research on neurocognitive development and mental health."
  site-url: https://neuromh-lab.github.io
  favicon: images/favicon.svg
  open-graph: true
  twitter-card: true
  image: images/Franc_Donkers_Pasfoto.jpg

  navbar:
    background: "#1A2E40"
    foreground: "#FFFFFF"
    title: "NeuroMH Lab"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: members.qmd
        text: People
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      - href: courses.qmd
        text: Teaching
      - href: opportunities.qmd
        text: Join Us
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/neuromh-lab/neuromh-lab.github.io

  page-footer:
    background: "#1A2E40"
    left: "&copy; 2026 NeuroMH Lab | Maastricht University"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: [flatly, custom.scss]
    toc: false
    smooth-scroll: true
    include-in-header:
      - text: |
          <meta name="google-site-verification" content="wyatzZpmjRF4A53Ua1ZnaKeWRlAvXtMnKe37lyLRXOM" />
          <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
          <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
          <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192x192.png">
          <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@graph": [
              {
                "@type": "Person",
                "@id": "https://neuromh-lab.github.io/#franc-donkers",
                "name": "Franc Donkers",
                "alternateName": "Franc C. L. Donkers",
                "givenName": "Franc",
                "familyName": "Donkers",
                "jobTitle": "Associate Professor of Cognitive Neuroscience",
                "url": "https://neuromh-lab.github.io",
                "image": "https://neuromh-lab.github.io/images/Franc_Donkers_Pasfoto.jpg",
                "affiliation": { "@type": "CollegeOrUniversity", "name": "Maastricht University" },
                "worksFor": { "@id": "https://neuromh-lab.github.io/#lab" },
                "sameAs": [
                  "https://www.maastrichtuniversity.nl/fcl-donkers",
                  "https://orcid.org/0000-0002-8252-0426",
