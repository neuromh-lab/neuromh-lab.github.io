              {
                "@type": "ResearchOrganization",
                "@id": "https://neuromh-lab.github.io/#lab",
                "name": "Neurocognitive Development & Mental Health Research Lab",
                "alternateName": "NeuroMH Lab",
                "url": "https://neuromh-lab.github.io",
                "logo": "https://neuromh-lab.github.io/images/favicon-192x192.png",
                "parentOrganization": { "@type": "CollegeOrUniversity", "name": "Maastricht University" },
                "founder": { "@id": "https://neuromh-lab.github.io/#franc-donkers" }
              }
