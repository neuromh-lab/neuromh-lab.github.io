project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "NeuroMH Lab"
  description: "Neurocognitive Development & Mental Health Research Lab — Maastricht University"
  favicon: images/favicon.svg

  navbar:
    background: "#1A2E40"
    foreground: "#FFFFFF"
    title: "NeuroMH Lab"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: members.qmd
        text: People
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      - href: courses.qmd
        text: Teaching
      - href: opportunities.qmd
        text: Join Us
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/neuromh-lab

  page-footer:
    background: "#1A2E40"
    left: "&copy; 2026 NeuroMH Lab | Maastricht University"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: [flatly, custom.scss]
    toc: false
    smooth-scroll: true
    include-in-header:
      - text: |
          <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
          <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
          <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192x192.png">
          <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
